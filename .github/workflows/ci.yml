name: ci
on:
   push:
      branches:
         - main
   workflow_dispatch:

permissions:
  contents: write

# =========================================================
# DOCUMENTACIÓN PRINCIPAL: VitePress en gh-pages
# =========================================================
#   https://lg-labs.github.io/lg5-spring/
#
#   Desplegar:
#     - Build:  site/  (VitePress)
#     - Branch: gh-pages
# =========================================================

jobs:
  deploy-site:

    runs-on: ubuntu-latest
    working-directory: site

    steps:
       - name: Checkout
         uses: actions/checkout@v5

       - name: Setup Node.js
         uses: actions/setup-node@v4
         with:
           node-version: 21
           cache: npm
           cache-dependency-path: package-lock.json

       - name: Install and build site
         run: |
           npm install
           npm run docs:build

       - name: Deploy to GitHub Pages
         uses: peaceiris/actions-gh-pages@v3
         with:
           github_token: ${{ secrets.GITHUB_TOKEN }}
           publish_dir: ./.vitepress/dist
           target_branch: gh-pages