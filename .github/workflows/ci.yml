name: ci
on:
  push:
    branches:
        - main

permissions:
  contents: write

# =========================================================
# DOCUMENTACIÓN PRINCIPAL: VitePress en gh-pages
# =========================================================
#   https://lg-labs.github.io/lg5-spring/
#   
#   Desplegar:
#     - Build:  site/  (VitePress)
#     - Branch: gh-pages
# =========================================================

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 21

        - name: Install and build site
          run: |
            cd site
            npm install
            npm run docs:build

        - name: Deploy to GitHub Pages
          uses: peaceiris/actions-gh-pages@v3
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./site/.vitepress/dist
            target_branch: gh-pages